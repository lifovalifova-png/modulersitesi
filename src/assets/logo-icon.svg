<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 31" fill="none" role="img" aria-label="ModülerPazar ikon">
  <title>ModülerPazar</title>

  <!--
    4 blok — offset (kenetlenme) düzeni
    Satır 1 : küçük #10b981 | geniş #059669
    Satır 2 : geniş #059669 | küçük #10b981
  -->

  <!-- Satır 1 -->
  <rect x="0"  y="0"  width="13" height="13" rx="2.5" fill="#10b981"/>
  <rect x="15" y="0"  width="21" height="13" rx="2.5" fill="#059669"/>

  <!-- Satır 2 -->
  <rect x="0"  y="15" width="21" height="13" rx="2.5" fill="#059669"/>
  <rect x="23" y="15" width="13" height="13" rx="2.5" fill="#10b981"/>

  <!-- Bağlantı çizgisi: iki satırı görsel olarak birleştiren ince detay -->
  <rect x="8"  y="13" width="2"  height="2"  rx="0.5" fill="#059669" opacity="0.5"/>
  <rect x="22" y="13" width="2"  height="2"  rx="0.5" fill="#10b981" opacity="0.5"/>
</svg>
