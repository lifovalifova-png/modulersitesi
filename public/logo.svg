<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 34" fill="none" role="img" aria-label="ModülerPazar">
  <title>ModülerPazar</title>

  <!--
    Modüler ikon — birbirine kenetlenen 4 dikdörtgen blok
    Satır 1 : küçük (sol) + geniş (sağ)
    Satır 2 : geniş (sol) + küçük (sağ)
    Bu "offset" düzen modüler yapıyı temsil eder.
  -->
  <g transform="translate(0,3)">
    <!-- Satır 1 -->
    <rect x="0"  y="0"  width="13" height="13" rx="2.5" fill="#10b981"/>
    <rect x="15" y="0"  width="21" height="13" rx="2.5" fill="#059669"/>
    <!-- Satır 2 -->
    <rect x="0"  y="15" width="21" height="13" rx="2.5" fill="#059669"/>
    <rect x="23" y="15" width="13" height="13" rx="2.5" fill="#10b981"/>
  </g>

  <!-- Wordmark -->
  <text
    x="46"
    y="22"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="21"
    font-weight="700"
    fill="#111827"
  >Modüler<tspan fill="#059669">Pazar</tspan></text>
</svg>
