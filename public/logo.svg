<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="ModülerPazar ikonu">
  <title>ModülerPazar</title>

  <!--
    Modüler ikon — 4 dikdörtgen blok, 32×32 kare
    Satır 1 : küçük (sol) + geniş (sağ)   — 3 px boşluk
    Satır 2 : geniş (sol) + küçük (sağ)   — 3 px boşluk
    Satırlar arası : 4 px boşluk
  -->

  <!-- Satır 1 -->
  <rect x="0"  y="1"  width="10" height="13" rx="2.5" fill="#10b981"/>
  <rect x="13" y="1"  width="19" height="13" rx="2.5" fill="#059669"/>

  <!-- Satır 2 -->
  <rect x="0"  y="18" width="19" height="13" rx="2.5" fill="#059669"/>
  <rect x="22" y="18" width="10" height="13" rx="2.5" fill="#10b981"/>
</svg>
