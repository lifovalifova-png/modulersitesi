<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="80"  cy="80"  r="120" fill="white" fill-opacity="0.04"/>
  <circle cx="1120" cy="550" r="160" fill="white" fill-opacity="0.04"/>
  <circle cx="1100" cy="80"  r="80"  fill="white" fill-opacity="0.04"/>

  <!-- Icon — white version, 5x scale, centered -->
  <g transform="translate(510, 115) scale(5)">
    <rect x="0"  y="0"  width="13" height="13" rx="2.5" fill="white" fill-opacity="0.85"/>
    <rect x="15" y="0"  width="21" height="13" rx="2.5" fill="white"/>
    <rect x="0"  y="15" width="21" height="13" rx="2.5" fill="white"/>
    <rect x="23" y="15" width="13" height="13" rx="2.5" fill="white" fill-opacity="0.85"/>
  </g>

  <!-- ModulerPazar text -->
  <text
    x="600"
    y="368"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="84"
    font-weight="800"
    fill="white"
    letter-spacing="-1"
  >Modüler<tspan fill="rgba(255,255,255,0.75)">Pazar</tspan></text>

  <!-- Subtitle -->
  <text
    x="600"
    y="438"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="34"
    font-weight="400"
    fill="rgba(255,255,255,0.78)"
  >Türkiye'nin Modüler Yapı Pazarı</text>
</svg>
