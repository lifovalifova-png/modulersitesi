name: Haftalık Sağlık Raporu

on:
  schedule:
    # Pazartesi 09:00 TR = 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run prod smoke (salt okunur)
        id: smoke
        continue-on-error: true
        run: pnpm exec playwright test --config=playwright.smoke.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: FAIL ise issue aç/güncelle
        if: ${{ steps.smoke.outcome == 'failure' }}
        uses: actions/github-script@v9
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Haftalık Sağlık Raporu — ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Prod smoke testi **başarısız** (outcome: ${process.env.SMOKE_OUTCOME}).`,
              ``,
              `- Çalıştırma: ${runUrl}`,
              `- Playwright raporu: çalıştırma sayfasındaki **playwright-report** artifact'ında.`,
              ``,
              `Kontrol edilenler: ana sayfa + başlık, çerez banner, /firmalar, /nasil-kullanilir, konsol hataları.`,
            ].join('\n');

            // Aynı gün için açık issue varsa yorum ekle, yoksa yeni issue aç
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-fail',
              per_page: 50,
            });
            const existing = open.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['health-fail'],
              });
            }
