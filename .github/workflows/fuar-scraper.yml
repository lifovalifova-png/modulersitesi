name: Fuar Scraper (Haftalık)

on:
  schedule:
    # Her Pazartesi 08:00 UTC (Türkiye 11:00)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save firebase

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx src/scripts/fuarScraper.ts
