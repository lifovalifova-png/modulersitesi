name: Firestore Weekly Backup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Write service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SA_JSON" > /tmp/sa.json

      - name: Run backup
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: npx tsx src/scripts/backup-firestore.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json
